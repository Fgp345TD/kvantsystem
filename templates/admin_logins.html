{% extends "base.html" %}

{% block content %}
<h1>Логины и пароли</h1>

<style>
.common-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    table-layout: auto;
}
.common-table th,
.common-table td {
    padding: 16px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.common-table th {
    background: rgba(30, 41, 59, 0.5);
    font-weight: 600;
    color: var(--text);
    position: sticky;
    top: 0;
}
.common-table tr:hover {
    background: rgba(30, 41, 59, 0.3);
}
</style>

<table class="common-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Логин</th>
            <th>Пароль</th>
            <th>Роль</th>
            <th>Дата создания</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td style="font-family: monospace; background: rgba(59, 130, 246, 0.05); padding: 4px 8px; border-radius: 4px;">
                {% if user[1] == 'admin' %}
                    ••••••••
                {% else %}
                    {{ user[2] }}
                {% endif %}
            </td>
            <td>{{ user[3] }}</td>
            <td>{{ user[4] or '—' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
