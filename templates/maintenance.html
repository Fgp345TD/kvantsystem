<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервер недоступен</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Roboto', sans-serif;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 6rem;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 16px 0;
            color: #cbd5e1;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            color: #94a3b8;
            line-height: 1.6;
        }
        .footer {
            padding: 20px;
            color: #647481;
            font-size: 14px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if mode == 'isolate' %}
        <div class="icon">🔒</div>
        <h1>Сервер изолирован</h1>
        <p>Доступ к сайту временно ограничен.</p>
        {% elif mode == 'maintenance' %}
        <div class="icon">⏳</div>
        <h1>Технический перерыв</h1>
        <p>На сайте проводятся временные технические работы. Повторите попытку входа позже.</p>
        {% endif %}
    </div>
    <div class="footer">
        © 2026 Сайт системы тестирования. Все права защищены.
    </div>
</body>
</html>
